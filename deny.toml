# cargo-deny configuration — supply-chain gate for the `mw` crate.
# Run locally with: cargo install cargo-deny && cargo deny check

[advisories]
version = 2
# RUSTSEC advisories: vulnerabilities deny by default; flag yanked crates too.
yanked = "deny"

[licenses]
version = 2
# The dependency tree resolves to these licenses (see `cargo metadata`). Keep
# this list tight so a surprising new license fails CI for review.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Unlicense",
    "BSD-3-Clause",
    "ISC",
]
confidence-threshold = 0.9

[bans]
# Surface (don't hard-fail on) duplicate versions and wildcard deps.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
