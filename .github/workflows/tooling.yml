name: ci

# The crate manifest is at the repository root; all cargo commands run there.
on:
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "deny.toml"
      - "tooling/**"
      - "template/**"
      - ".github/workflows/tooling.yml"
  # No `paths` filter on pull_request: the CI jobs are required status checks
  # in the branch ruleset, so they must run on every PR. A path filter would
  # leave checks unreported (and thus the PR un-mergeable) whenever a change
  # touches none of the filtered paths. The `push` filter above still scopes
  # branch pushes.
  pull_request:

jobs:
  test:
    name: fmt + clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Format check
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Tests (unit + integration)
        run: cargo test --all-targets
      - name: Doc tests
        run: cargo test --doc

  msrv:
    # The minimum supported Rust version is declared once, in Cargo.toml
    # (`rust-version`). This job reads it from there instead of hardcoding a
    # toolchain ref, so there is a single source of truth and nothing for
    # Dependabot to "bump" to a not-yet-released version.
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Resolve MSRV from Cargo.toml
        id: msrv
        run: echo "version=$(grep -m1 '^rust-version' Cargo.toml | sed -E 's/.*"(.*)".*/\1/')" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # The repo's rust-toolchain.toml pins `channel = "stable"`, which would
      # otherwise override the toolchain selected above and silently build on
      # stable instead of the MSRV. RUSTUP_TOOLCHAIN takes precedence over
      # rust-toolchain.toml, so it forces these steps onto the resolved MSRV.
      - name: Build at the pinned minimum supported Rust version
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}
        run: cargo build --locked
      - name: Test at MSRV
        env:
          RUSTUP_TOOLCHAIN: ${{ steps.msrv.outputs.version }}
        run: cargo test --locked

  deny:
    name: cargo-deny (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2.0.20
        with:
          command: check
