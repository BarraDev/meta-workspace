name: release

# On a `v*` tag: create the GitHub Release once, then build `mw` for
# Linux/macOS/Windows and upload each archive (with a SHA-256 checksum).
# The release is created in a single prerequisite job so the matrix build
# jobs never race to create the same release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify version and CHANGELOG before releasing
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"

          # The tag must match Cargo.toml's version: a release whose tag and
          # crate version disagree would ship mislabeled binaries (and break a
          # future crates.io publish).
          crate_version="$(grep -m1 -E '^version = ' Cargo.toml | sed -E 's/^version = "(.*)"/\1/')"
          if [ "$crate_version" != "$version" ]; then
            echo "::error::tag $GITHUB_REF_NAME (version $version) does not match Cargo.toml version $crate_version"
            exit 1
          fi

          # CHANGELOG.md must carry release notes for this version, in Keep a
          # Changelog form, e.g. `## [0.1.1] - 2026-06-01`.
          if ! grep -qE "^## \[${version//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$version]' section; move the Unreleased notes under a '## [$version]' heading before tagging"
            exit 1
          fi
          echo "Verified Cargo.toml version and CHANGELOG entry for $version."
      - name: Create the release if it does not exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; reusing it."
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$GITHUB_REF_NAME" \
              --notes "Prebuilt \`mw\` binaries. See CHANGELOG.md for changes."
          fi

  upload:
    name: build + upload ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package and upload (Unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          name="mw-${{ matrix.target }}"
          tar -czf "$name.tar.gz" -C "target/${{ matrix.target }}/release" mw
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
          gh release upload "$GITHUB_REF_NAME" "$name.tar.gz" "$name.tar.gz.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Package and upload (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $name = "mw-${{ matrix.target }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/mw.exe" -DestinationPath "$name.zip"
          $hash = (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -FilePath "$name.zip.sha256" -Encoding ascii
          gh release upload "$env:GITHUB_REF_NAME" "$name.zip" "$name.zip.sha256" `
            --repo "$env:GITHUB_REPOSITORY" --clobber
