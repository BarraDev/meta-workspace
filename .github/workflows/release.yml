name: release

# Build prebuilt `mw` binaries for Linux/macOS/Windows and attach them, with
# SHA-256 checksums, to a GitHub Release when a `v*` tag is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          name="mw-${{ matrix.target }}"
          tar -czf "$name.tar.gz" -C "target/${{ matrix.target }}/release" mw
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "mw-${{ matrix.target }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/mw.exe" -DestinationPath "$name.zip"
          $hash = (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -FilePath "$name.zip.sha256" -Encoding ascii

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            mw-${{ matrix.target }}.tar.gz
            mw-${{ matrix.target }}.tar.gz.sha256
            mw-${{ matrix.target }}.zip
            mw-${{ matrix.target }}.zip.sha256
