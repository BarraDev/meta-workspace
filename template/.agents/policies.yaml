# Harness-neutral policy file for `mw policy check`.
# Programmatic deny is supported by Claude and Pi adapters. Codex and Gemini
# consume these policies as instructions/advisory guidance.
version: 1

protect_paths:
  enabled: true
  deny_write:
    - .env
    - .env.*
    - secrets/

enforce_worktree:
  enabled: true
  action: warn # warn | deny

draft_only_pr:
  enabled: true
  action: deny
  # When true, PR publish events are allowed only if the user authorizes them
  # out-of-band by setting MW_USER_APPROVED=1 in the environment. Approval is
  # never read from the tool event payload, so an agent cannot self-approve.
  require_explicit_user_approval: true
