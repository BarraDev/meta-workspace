workspace:
  schemaVersion: 1
  name: meta-workspace
  type: company-meta-workspace
  company_id: null
  company_name: null

tooling:
  # The optional `mw` Rust binary maintains this workspace.
  # Tier 0 (the workspace files) requires no runtime; `mw` is only needed to
  # create or maintain a workspace. See docs/workspace-contract.md.
  manager: mw
  crate: meta-workspace
  language: rust
  mode: managed # managed | ejected
  contract: docs/workspace-contract.md

paths:
  repos: ../repos
  worktrees: ../worktrees
  scratch: ../scratch
  archives: ../archives
  logs: ../logs

agent_support:
  canonical_root: .agents
  instruction_file: .agents/AGENTS.md
  symlink_compatibility: true
  tools:
    claude: true
    pi: true
    codex: true
    gemini: true

sdd:
  enabled: false
  provider: cc-sdd
  kiro_dir: .kiro
  install_mode: staged # staged | direct
  memory_policy: vendor # vendor | replace
  generated_memory_document: .agents/vendor/cc-sdd/CLAUDE.md
  installed_agents: []

memory:
  profile: none # none | mempalace | prism | full
  mempalace:
    enabled: false
    wing: null
  prism:
    enabled: false
    project: null

pr_work:
  default_mode: draft_only
  post_comments: only_after_user_confirmation

policies:
  # Harness-neutral enforcement rules evaluated by `mw policy check`.
  # Real programmatic deny is supported on Claude and Pi; Codex/Gemini are advisory.
  # See docs/workspace-contract.md (Enforcement engine).
  enforcement_file: .agents/policies.yaml
  protect_paths:
    enabled: true
    deny_write: [".env", ".env.*", "secrets/"]
  enforce_worktree:
    enabled: true
    action: warn # warn | deny
  draft_only_pr:
    enabled: true
    action: deny # block PR comment/approve/post without explicit override
